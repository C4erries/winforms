services:
  postgres:
    image: postgres:16-alpine
    container_name: stationery-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stationery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5432:5432"
    volumes:
      - stationery-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stationery"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  stationery-data:
